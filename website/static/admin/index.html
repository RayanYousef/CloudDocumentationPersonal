<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
  </head>
  <body>
    <!--
      Sveltia CMS (MIT) — a Git-based headless CMS that runs entirely in the
      browser. With the "Sign In with Token" (PAT) flow it needs NO backend, so
      it works on a static GitHub Pages deployment. Config lives in config.yml.
    -->
    <!-- Pinned to a specific version to avoid uncontrolled upgrades of a
         credential-bearing admin page. For the strongest posture, self-host this
         script under static/admin/ instead of loading it from a CDN. -->
    <script src="https://unpkg.com/@sveltia/cms@0.167.3/dist/sveltia-cms.js" crossorigin="anonymous"></script>
  </body>
</html>
